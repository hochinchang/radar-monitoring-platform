<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儀器即時狀況 — 雷達監控整合平台</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <a href="/" class="back-link">← 首頁</a>
      <h1>儀器即時狀況</h1>
    </div>
    <div class="time-bar">
      <span>本地時間：<span id="local-time">--</span></span>
      <span>UTC：<span id="utc-time">--</span></span>
      <span class="refresh-info">
        上次更新：<span id="last-refreshed">--</span>
        <button id="btn-refresh">⟳ 刷新</button>
      </span>
    </div>
  </header>

  <main>
    <div id="status-bar" class="status-bar hidden"></div>
    <div class="dept-filter-bar">
      <button class="dept-btn active" data-dept="all">全部</button>
      <button class="dept-btn" data-dept="wrs">氣象雷達科</button>
      <button class="dept-btn" data-dept="mrs">海象雷達科</button>
      <button class="dept-btn" data-dept="sos">衛星作業科</button>
      <button class="dept-btn" data-dept="dqcs">品管科</button>
      <button class="dept-btn" data-dept="rsa">應用科</button>
    </div>
    <section class="section">
      <h2>儀器警示狀態</h2>
      <div id="instruments-container" class="instruments-grid">
        <p class="loading">載入中…</p>
      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
